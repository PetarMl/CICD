---
- name: install maven on the Ubuntu slave
  ansible.builtin.apt:
    name:
      - maven
    state: present
    update_cache: yes

- name: copy Maven project on the Ubuntu slave
  tags: maven,ubuntu
  ansible.builtin.copy:
    src: /var/lib/jenkins/workspace/CICD/maven-projekat/target/maven-projekat-1.0-SNAPSHOT.jar
    dest: /home/jenkins/maven-projekat-1.0-SNAPSHOT.jar
    owner: root
    group: root
    mode: 0644
