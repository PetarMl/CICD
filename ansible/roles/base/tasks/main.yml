---
- name: install packages on the agents
  ansible.builtin.package:
    name:
      - "{{ java_package }}"
      - git
      - curl
      - wget
      - "{{ node_exporter_package }}"
    state: present

- name: start and  enable node exporter on the slaves
  ansible.builtin.service:
    name: "{{ node_exporter_service }}"
    state: started
    enabled: true
